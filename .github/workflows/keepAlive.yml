name: Keep Render Server Awake

# 設定觸發條件
on:
  schedule:
    # 使用 cron 語法，設定為每 13 分鐘執行一次
    - cron: '*/13 * * * *'
  # 加入 workflow_dispatch 允許我們在 GitHub 網頁上手動點擊測試
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API endpoint
        # 使用 curl 發送 HTTP 請求去戳你的 Render API
        run: |
          echo "Pinging Render API..."
          curl -s https://gofin-tracker.onrender.com/api/v1/klines > /dev/null
          echo "Ping completed!"